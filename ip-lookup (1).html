<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IP Lookup Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161820;
    --bg3: #1e2028;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8a8fa8;
    --text3: #555a70;
    --accent: #4fffb0;
    --accent2: #00c9ff;
    --accent3: #ff6b6b;
    --radius: 12px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans Thai', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    background: rgba(14,15,17,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.5; transform:scale(0.85); }
  }
  .logo-text { font-family: var(--mono); font-size: 15px; font-weight: 500; letter-spacing: 0.06em; color: var(--text); }
  .logo-text span { color: var(--accent); }
  .header-meta { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text3); }

  /* LAYOUT */
  .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* MY IP CARD */
  .myip-card {
    background: linear-gradient(135deg, #1a2a1a 0%, #0e1a2a 100%);
    border: 1px solid rgba(79,255,176,0.2);
    border-radius: var(--radius);
    padding: 1.75rem 2rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .myip-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(79,255,176,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .myip-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--accent); margin-bottom: .75rem; text-transform: uppercase; }
  .myip-ip { font-family: var(--mono); font-size: 32px; font-weight: 500; color: #fff; letter-spacing: .02em; margin-bottom: .35rem; }
  .myip-sub { font-size: 13px; color: var(--text2); }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: .04em; }
  .badge-green { background: rgba(79,255,176,0.12); color: var(--accent); border: 1px solid rgba(79,255,176,0.25); }
  .badge-blue  { background: rgba(0,201,255,0.12); color: var(--accent2); border: 1px solid rgba(0,201,255,0.25); }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; }
  .tab {
    padding: 8px 18px; border-radius: 8px;
    font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: .04em;
    cursor: pointer; border: 1px solid transparent;
    background: transparent; color: var(--text2);
    transition: all .15s;
  }
  .tab:hover { color: var(--text); border-color: var(--border2); }
  .tab.active { background: var(--bg3); color: var(--accent); border-color: rgba(79,255,176,0.25); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* CARD */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .card-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--text3); text-transform: uppercase; margin-bottom: 1rem; }

  /* SEARCH */
  .search-row { display: flex; gap: 8px; margin-bottom: .75rem; }
  .search-row input {
    flex: 1;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 14px;
    font-family: var(--mono); font-size: 13px; color: var(--text);
    outline: none; transition: border-color .15s;
  }
  .search-row input:focus { border-color: rgba(79,255,176,0.4); }
  .search-row input::placeholder { color: var(--text3); }
  .btn {
    padding: 10px 18px; border-radius: 8px;
    background: rgba(79,255,176,0.1); border: 1px solid rgba(79,255,176,0.3);
    color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .btn:hover { background: rgba(79,255,176,0.18); }
  .btn-ghost {
    padding: 8px 14px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); font-family: var(--mono); font-size: 11px;
    cursor: pointer; transition: all .15s;
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger { border-color: rgba(255,107,107,.3); color: var(--accent3); background: rgba(255,107,107,.07); }
  .btn-danger:hover { background: rgba(255,107,107,.13); }

  .err { font-family: var(--mono); font-size: 12px; color: var(--accent3); margin-bottom: .75rem; display: none; padding: 8px 12px; background: rgba(255,107,107,0.07); border-radius: 8px; border: 1px solid rgba(255,107,107,0.2); }

  /* INFO TABLE */
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 1px solid var(--border);
    font-size: 13px; gap: 12px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--text2); font-size: 12px; flex-shrink: 0; }
  .info-value { font-family: var(--mono); font-size: 12px; color: var(--text); text-align: right; word-break: break-all; max-width: 65%; }

  /* METRICS */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 1rem 0; }
  .metric { background: var(--bg3); border-radius: 10px; padding: .9rem 1rem; }
  .metric-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .08em; margin-bottom: 4px; }
  .metric-value { font-family: var(--mono); font-size: 16px; color: var(--text); }

  /* MAP */
  .map-container { border-radius: 10px; overflow: hidden; margin: 1rem 0; border: 1px solid var(--border); }
  .map-container iframe { width: 100%; height: 280px; border: none; display: block; }
  .map-placeholder { height: 120px; display: flex; align-items: center; justify-content: center; background: var(--bg3); color: var(--text3); font-family: var(--mono); font-size: 12px; }

  /* ACTION ROW */
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* RESULT IP HEADER */
  .result-ip { font-family: var(--mono); font-size: 24px; color: #fff; font-weight: 500; margin-bottom: 3px; }
  .result-org { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }

  /* COMPARE */
  .cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cmp-slot { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; }
  .cmp-slot-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .08em; margin-bottom: .5rem; }
  .cmp-slot-ip { font-family: var(--mono); font-size: 16px; color: var(--text); margin-bottom: .75rem; }
  .cmp-row { font-size: 12px; color: var(--text2); padding: 4px 0; }
  .cmp-row span { color: var(--text); font-family: var(--mono); }

  /* HISTORY */
  .hist-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; gap: 10px; transition: opacity .1s;
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-item:hover { opacity: .8; }
  .hist-ip { font-family: var(--mono); font-size: 14px; color: var(--text); }
  .hist-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .hist-time { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .hist-arrow { color: var(--text3); font-size: 12px; }
  .empty { text-align: center; padding: 2.5rem; font-family: var(--mono); font-size: 12px; color: var(--text3); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--bg3); border: 1px solid rgba(79,255,176,0.3);
    color: var(--accent); font-family: var(--mono); font-size: 12px;
    padding: 10px 18px; border-radius: 10px;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }

  /* LOADING */
  .loading { font-family: var(--mono); font-size: 12px; color: var(--text3); }

  @media (max-width: 520px) {
    .myip-ip { font-size: 22px; }
    .cmp-grid { grid-template-columns: 1fr; }
    .grid2 { grid-template-columns: 1fr; }
    .action-row { flex-direction: column; }
    .action-row .btn-ghost { text-align: center; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo-dot"></div>
  <div class="logo-text"><span>IP</span>Lookup</div>
  <div class="header-meta" id="clock"></div>
</header>

<main class="main">

  <!-- MY IP -->
  <div class="myip-card">
    <div class="myip-label">Your IP Address</div>
    <div id="myip-body" class="loading">กำลังตรวจสอบ...</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('lookup')">ค้นหา IP</button>
    <button class="tab" onclick="switchTab('compare')">เปรียบเทียบ</button>
    <button class="tab" onclick="switchTab('history')">ประวัติ</button>
  </div>

  <!-- LOOKUP -->
  <div class="panel active" id="tab-lookup">
    <div class="card">
      <div class="card-label">Search IP Address</div>
      <div class="search-row">
        <input type="text" id="ip-inp" placeholder="เช่น 8.8.8.8 หรือ 1.1.1.1" />
        <button class="btn" onclick="doLookup()">ค้นหา →</button>
      </div>
      <div class="err" id="err-msg"></div>

      <div id="result-area" style="display:none">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
          <span class="result-ip" id="r-ip">—</span>
          <span class="badge badge-blue" id="r-ver">IPv4</span>
        </div>
        <div class="result-org" id="r-org">—</div>

        <div class="info-row"><span class="info-label">ประเทศ</span><span class="info-value" id="r-country">—</span></div>
        <div class="info-row"><span class="info-label">เมือง / ภูมิภาค</span><span class="info-value" id="r-city">—</span></div>
        <div class="info-row"><span class="info-label">รหัสไปรษณีย์</span><span class="info-value" id="r-postal">—</span></div>
        <div class="info-row"><span class="info-label">Timezone</span><span class="info-value" id="r-tz">—</span></div>
        <div class="info-row"><span class="info-label">ISP / องค์กร</span><span class="info-value" id="r-isp">—</span></div>
        <div class="info-row"><span class="info-label">ASN</span><span class="info-value" id="r-asn">—</span></div>
        <div class="info-row"><span class="info-label">Hostname</span><span class="info-value" id="r-host">—</span></div>

        <div class="grid2">
          <div class="metric"><div class="metric-label">Latitude</div><div class="metric-value" id="r-lat">—</div></div>
          <div class="metric"><div class="metric-label">Longitude</div><div class="metric-value" id="r-lon">—</div></div>
        </div>

        <div class="map-container">
          <div class="map-placeholder" id="map-ph">— แผนที่จะแสดงที่นี่ —</div>
          <iframe id="map-frame" style="display:none" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div class="action-row">
          <button class="btn-ghost" onclick="copyJSON()">Copy JSON</button>
          <button class="btn-ghost" onclick="copyCSV()">Copy CSV</button>
          <button class="btn-ghost" onclick="openGmap()">เปิด Google Maps ↗</button>
        </div>
      </div>
    </div>
  </div>

  <!-- COMPARE -->
  <div class="panel" id="tab-compare">
    <div class="card">
      <div class="card-label">Compare IP Addresses</div>
      <div class="search-row" style="flex-wrap:wrap">
        <input type="text" id="cmp-a" placeholder="IP แรก เช่น 8.8.8.8" style="min-width:140px" />
        <input type="text" id="cmp-b" placeholder="IP ที่สอง เช่น 1.1.1.1" style="min-width:140px" />
        <button class="btn" onclick="doCompare()">เปรียบเทียบ →</button>
      </div>
      <div class="err" id="cmp-err"></div>
      <div id="cmp-result" style="display:none">
        <div class="cmp-grid">
          <div class="cmp-slot" id="cmp-slot-a"><div class="cmp-slot-label">IP แรก</div>—</div>
          <div class="cmp-slot" id="cmp-slot-b"><div class="cmp-slot-label">IP ที่สอง</div>—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="tab-history">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div class="card-label" style="margin:0">Search History</div>
        <button class="btn-ghost btn-danger" onclick="clearHistory()">ล้างทั้งหมด</button>
      </div>
      <div id="hist-list"><div class="empty">ยังไม่มีประวัติการค้นหา</div></div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
let history = JSON.parse(localStorage.getItem('ip_history')||'[]');
let lastData = null, lastLat = null, lastLon = null;

// Clock
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000); updateClock();

// Tab
function switchTab(name) {
  ['lookup','compare','history'].forEach((n,i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', n===name);
    document.getElementById('tab-'+n).classList.toggle('active', n===name);
  });
  if(name==='history') renderHistory();
}

// Fetch
async function fetchIP(ip) {
  const url = ip ? `https://ipapi.co/${ip}/json/` : 'https://ipapi.co/json/';
  const res = await fetch(url);
  const d = await res.json();
  if(d.error) throw new Error(d.reason||'ไม่พบข้อมูล IP นี้');
  return d;
}

// Load My IP
async function loadMyIP() {
  try {
    const d = await fetchIP();
    document.getElementById('myip-body').innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px">
        <span class="myip-ip">${d.ip}</span>
        <span class="badge badge-green">${d.version||'IPv4'}</span>
      </div>
      <div class="myip-sub">${d.org||''} &nbsp;·&nbsp; ${[d.city,d.country_name].filter(Boolean).join(', ')}</div>
    `;
    document.getElementById('ip-inp').placeholder = `เช่น ${d.ip} หรือ 8.8.8.8`;
  } catch(e) {
    document.getElementById('myip-body').innerHTML = '<span style="color:var(--accent3);font-size:12px;font-family:var(--mono)">ไม่สามารถโหลด IP ได้</span>';
  }
}

function isValid(ip) {
  return /^(\d{1,3}\.){3}\d{1,3}$/.test(ip) || /^[0-9a-fA-F:]{2,39}$/.test(ip);
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  setTimeout(()=>{ el.style.display='none'; }, 4000);
}

// Lookup
async function doLookup(ipOverride) {
  const ip = ipOverride || document.getElementById('ip-inp').value.trim();
  if(!ip) { showErr('err-msg','กรุณาใส่ IP Address ก่อน'); return; }
  if(!isValid(ip)) { showErr('err-msg','รูปแบบ IP ไม่ถูกต้อง (ตัวอย่าง: 8.8.8.8)'); return; }
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('err-msg').style.display = 'none';
  try {
    const d = await fetchIP(ip);
    lastData = d; lastLat = d.latitude; lastLon = d.longitude;
    document.getElementById('r-ip').textContent = d.ip || ip;
    document.getElementById('r-ver').textContent = d.version || 'IPv4';
    document.getElementById('r-org').textContent = d.org || '—';
    document.getElementById('r-country').textContent = `${d.country_name||'—'}${d.country_code?' ('+d.country_code+')':''}`;
    document.getElementById('r-city').textContent = [d.city,d.region].filter(Boolean).join(', ') || '—';
    document.getElementById('r-postal').textContent = d.postal || '—';
    document.getElementById('r-tz').textContent = d.timezone || '—';
    document.getElementById('r-isp').textContent = d.org || '—';
    document.getElementById('r-asn').textContent = d.asn || '—';
    document.getElementById('r-host').textContent = d.hostname || '—';
    document.getElementById('r-lat').textContent = d.latitude ? d.latitude.toFixed(5) : '—';
    document.getElementById('r-lon').textContent = d.longitude ? d.longitude.toFixed(5) : '—';
    if(d.latitude && d.longitude) {
      const frame = document.getElementById('map-frame');
      frame.src = `https://maps.google.com/maps?q=${d.latitude},${d.longitude}&z=12&output=embed`;
      frame.style.display = 'block';
      document.getElementById('map-ph').style.display = 'none';
    }
    document.getElementById('result-area').style.display = 'block';
    addHistory(d);
    if(ipOverride) { switchTab('lookup'); document.getElementById('ip-inp').value = ip; }
  } catch(e) {
    showErr('err-msg', e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
  }
}

// History
function addHistory(d) {
  history = history.filter(h => h.ip !== d.ip);
  history.unshift({ ip:d.ip, country:d.country_name, city:d.city, org:d.org, time: new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) });
  if(history.length > 30) history.pop();
  localStorage.setItem('ip_history', JSON.stringify(history));
}

function renderHistory() {
  const el = document.getElementById('hist-list');
  if(!history.length) { el.innerHTML='<div class="empty">// ยังไม่มีประวัติการค้นหา</div>'; return; }
  el.innerHTML = history.map(h=>`
    <div class="hist-item" onclick="doLookup('${h.ip}')">
      <div>
        <div class="hist-ip">${h.ip}</div>
        <div class="hist-meta">${[h.city,h.country].filter(Boolean).join(', ')}${h.org?' · '+h.org:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="hist-time">${h.time}</span>
        <span class="hist-arrow">→</span>
      </div>
    </div>
  `).join('');
}

function clearHistory() { history=[]; localStorage.removeItem('ip_history'); renderHistory(); }

// Compare
async function doCompare() {
  const a = document.getElementById('cmp-a').value.trim();
  const b = document.getElementById('cmp-b').value.trim();
  if(!a||!b) { showErr('cmp-err','กรุณาใส่ IP ทั้ง 2 ช่อง'); return; }
  if(!isValid(a)||!isValid(b)) { showErr('cmp-err','รูปแบบ IP ไม่ถูกต้อง'); return; }
  document.getElementById('cmp-result').style.display = 'block';
  ['a','b'].forEach(k => {
    document.getElementById('cmp-slot-'+k).innerHTML = `<div class="cmp-slot-label">IP ${k==='a'?'แรก':'ที่สอง'}</div><div class="loading">กำลังโหลด...</div>`;
  });
  const [da, db] = await Promise.allSettled([fetchIP(a), fetchIP(b)]);
  renderSlot('cmp-slot-a', 'IP แรก', da.status==='fulfilled'?da.value:null, da.reason);
  renderSlot('cmp-slot-b', 'IP ที่สอง', db.status==='fulfilled'?db.value:null, db.reason);
}

function renderSlot(id, label, d, err) {
  const el = document.getElementById(id);
  if(!d) { el.innerHTML=`<div class="cmp-slot-label">${label}</div><div style="color:var(--accent3);font-size:12px;font-family:var(--mono)">${err?.message||'ไม่พบข้อมูล'}</div>`; return; }
  el.innerHTML=`
    <div class="cmp-slot-label">${label}</div>
    <div class="cmp-slot-ip">${d.ip}</div>
    <div class="cmp-row">ประเทศ: <span>${d.country_name||'—'}</span></div>
    <div class="cmp-row">เมือง: <span>${d.city||'—'}</span></div>
    <div class="cmp-row">ISP: <span>${d.org||'—'}</span></div>
    <div class="cmp-row">ASN: <span>${d.asn||'—'}</span></div>
    <div class="cmp-row">Timezone: <span>${d.timezone||'—'}</span></div>
    <div class="cmp-row">พิกัด: <span>${d.latitude?d.latitude.toFixed(3):'-'}, ${d.longitude?d.longitude.toFixed(3):'-'}</span></div>
  `;
  addHistory(d);
}

// Copy
function copyJSON() {
  if(!lastData) return;
  const j = { ip:lastData.ip, version:lastData.version, country:lastData.country_name, country_code:lastData.country_code, city:lastData.city, region:lastData.region, postal:lastData.postal, org:lastData.org, asn:lastData.asn, timezone:lastData.timezone, latitude:lastData.latitude, longitude:lastData.longitude };
  navigator.clipboard.writeText(JSON.stringify(j,null,2)).then(()=>showToast('Copied as JSON!'));
}
function copyCSV() {
  if(!lastData) return;
  const h = 'ip,version,country,city,region,postal,org,asn,timezone,latitude,longitude';
  const v = [lastData.ip,lastData.version,lastData.country_name,lastData.city,lastData.region,lastData.postal,lastData.org,lastData.asn,lastData.timezone,lastData.latitude,lastData.longitude].map(x=>`"${x||''}"`).join(',');
  navigator.clipboard.writeText(h+'\n'+v).then(()=>showToast('Copied as CSV!'));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(()=>{ t.style.opacity='0'; }, 2200);
}
function openGmap() {
  if(lastLat&&lastLon) window.open(`https://www.google.com/maps?q=${lastLat},${lastLon}&z=13`,'_blank');
}

// Keyboard
document.getElementById('ip-inp').addEventListener('keydown',e=>{ if(e.key==='Enter') doLookup(); });

document.getElementById('cmp-b').addEventListener('keydown',e=>{ if(e.key==='Enter') doCompare(); });
